<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NetAtlas — Sensors</title>
  <link rel="stylesheet" href="/static/css/base.css">
  <link rel="stylesheet" href="/static/css/layout.css">
  <link rel="stylesheet" href="/static/css/components.css">
</head>
<body>
<div class="app-shell">

  <nav class="nav" id="main-nav"></nav>

  <header class="topbar">
    <div class="topbar-breadcrumb">
      <span class="topbar-breadcrumb-current">Sensors</span>
    </div>

    <div class="topbar-search">
      <svg class="topbar-search-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
      <input type="text" placeholder="Filter sensors…" id="sensor-filter">
    </div>

    <div style="margin-left:auto;display:flex;gap:8px;align-items:center;">
      <div id="view-toggle" style="display:flex;gap:4px;">
        <button class="btn btn-secondary btn-sm active" id="btn-table-view" title="Table view">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/>
            <line x1="8" y1="18" x2="21" y2="18"/>
            <line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/>
            <line x1="3" y1="18" x2="3.01" y2="18"/>
          </svg>
        </button>
        <button class="btn btn-ghost btn-sm" id="btn-card-view" title="Card view">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/>
            <rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/>
          </svg>
        </button>
      </div>
      <div class="topbar-sep"></div>
      <button class="topbar-icon-btn" id="theme-toggle-btn" title="Toggle theme">
        <svg class="icon-sun" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="5"/>
          <line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/>
          <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
          <line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/>
          <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
        </svg>
        <svg class="icon-moon" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
        </svg>
      </button>
    </div>
  </header>

  <main class="content">
    <div class="content-inner">

      <!-- Summary KPIs -->
      <div class="grid-4" style="margin-bottom:20px;" id="sensor-kpis">
        <div class="stat-card green">
          <div class="stat-card-label">Online</div>
          <div class="stat-card-value" id="kpi-online">—</div>
        </div>
        <div class="stat-card amber">
          <div class="stat-card-label">Warning</div>
          <div class="stat-card-value" id="kpi-warning">—</div>
        </div>
        <div class="stat-card red">
          <div class="stat-card-label">Offline</div>
          <div class="stat-card-value" id="kpi-offline">—</div>
        </div>
        <div class="stat-card blue">
          <div class="stat-card-label">Total Events</div>
          <div class="stat-card-value" id="kpi-total-events">—</div>
        </div>
      </div>

      <!-- Table view -->
      <div id="table-view" class="card">
        <div class="card-header">
          <div class="card-title">All Sensors</div>
          <div class="card-actions">
            <span class="t-sm text-muted" id="sensor-count"></span>
          </div>
        </div>
        <div class="card-body-flush">
          <table class="data-table" id="sensors-table">
            <thead>
              <tr>
                <th class="sortable" data-col="name">Name <span class="sort-icon"></span></th>
                <th>Location</th>
                <th>Status</th>
                <th>Version</th>
                <th>Last Seen</th>
                <th class="sortable" data-col="events">Events <span class="sort-icon"></span></th>
                <th class="sortable" data-col="latency">Latency <span class="sort-icon"></span></th>
                <th>Sources</th>
                <th>Uptime</th>
              </tr>
            </thead>
            <tbody id="sensors-tbody"></tbody>
          </table>
        </div>
      </div>

      <!-- Card view (hidden by default) -->
      <div id="card-view" class="grid-3" style="display:none;"></div>

    </div>
  </main>

  <footer class="statusbar">
    <div class="statusbar-item">
      <div class="statusbar-item-dot green"></div>
      <span id="sb-sensors">Loading…</span>
    </div>
    <div class="statusbar-time" id="statusbar-time"></div>
  </footer>

</div>
<script src="/static/js/theme.js"></script>
<script src="/static/js/api.js"></script>
<script src="/static/js/nav.js"></script>
<script src="/static/js/sensors.js"></script>
</body>
</html>

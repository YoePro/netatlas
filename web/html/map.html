<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NetAtlas — Network Map</title>
  <link rel="stylesheet" href="/static/css/base.css">
  <link rel="stylesheet" href="/static/css/layouts.css">
  <link rel="stylesheet" href="/static/css/components.css">
  <style>
    html, body { height: 100%; }
    body { overflow: hidden; }
    .app-shell {
      min-height: 100vh;
      display: grid;
      grid-template-columns: var(--nav-width) minmax(0, 1fr);
      grid-template-rows: var(--topbar-height) minmax(0, 1fr) var(--statusbar-height);
    }
    .nav { grid-row: 1 / 4; grid-column: 1; }
    .topbar { grid-row: 1; grid-column: 2; }
    .content { grid-row: 2; grid-column: 2; min-height: 0; }
    .statusbar { grid-row: 3; grid-column: 2; }
    .content { overflow: hidden; }
    .map-shell {
      display: flex;
      flex-direction: column;
      height: 100%;
    }
    #map-canvas-wrap {
      flex: 1;
      position: relative;
      overflow: hidden;
      background: var(--bg-base);
      cursor: grab;
    }
    #map-canvas-wrap.grabbing { cursor: grabbing; }
    #map-canvas {
      position: absolute;
      top: 0; left: 0;
    }

    /* Filter sidebar */
    .map-filter-panel {
      width: 220px;
      background: var(--bg-surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
      overflow-y: auto;
      padding: 12px;
      gap: 16px;
    }
    .map-filter-section {}
    .map-filter-label {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .06em;
      color: var(--text-muted);
      margin-bottom: 8px;
    }
    .map-filter-item {
      display: flex;
      align-items: center;
      gap: 7px;
      padding: 5px 0;
      cursor: pointer;
      font-size: 13px;
      color: var(--text-secondary);
    }
    .map-filter-item input { accent-color: var(--blue); }
    .map-filter-count {
      margin-left: auto;
      font-size: 11px;
      color: var(--text-muted);
      font-variant-numeric: tabular-nums;
    }

    .map-layout {
      display: flex;
      flex: 1;
      min-height: 0;
      overflow: hidden;
    }

    #map-search-input {
      width: 200px;
    }

    /* Stats strip */
    .map-stats {
      display: flex;
      gap: 20px;
      padding: 0 16px;
      align-items: center;
    }
    .map-stat-item {
      font-size: 12px;
      color: var(--text-secondary);
      display: flex;
      align-items: center;
      gap: 5px;
    }
    .map-stat-item strong {
      font-weight: 600;
      color: var(--text-primary);
    }
  </style>
</head>
<body>
<div class="app-shell">

  <nav class="nav" id="main-nav"></nav>

  <header class="topbar">
    <div class="topbar-breadcrumb">
      <span class="topbar-breadcrumb-current">Network Map</span>
    </div>

    <div class="topbar-search" style="width:220px">
      <svg class="topbar-search-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
      <input type="text" placeholder="Search nodes…" id="map-search-input">
    </div>

    <div class="map-stats" id="map-stats">
      <div class="map-stat-item"><span>Nodes:</span><strong id="stat-nodes">—</strong></div>
      <div class="map-stat-item"><span>Edges:</span><strong id="stat-edges">—</strong></div>
    </div>

    <div style="margin-left:auto;display:flex;gap:8px;align-items:center;">
      <button class="btn btn-secondary btn-sm" id="btn-fit">Fit view</button>
      <button class="btn btn-secondary btn-sm" id="btn-reset-filter">Reset filter</button>
      <div class="topbar-sep"></div>
      <button class="topbar-icon-btn" id="theme-toggle-btn" title="Toggle theme">
        <svg class="icon-sun" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="5"/>
          <line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/>
          <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
          <line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/>
          <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
        </svg>
        <svg class="icon-moon" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
        </svg>
      </button>
    </div>
  </header>

  <main class="content">
    <div class="map-shell">
      <div class="map-toolbar">
        <!-- Node type filters inline -->
        <span class="t-sm text-muted" style="margin-right:4px;">Show:</span>
        <label style="display:flex;align-items:center;gap:5px;font-size:13px;color:var(--text-secondary);cursor:pointer">
          <input type="checkbox" class="node-filter" data-type="client"   checked style="accent-color:var(--blue)"> Clients
        </label>
        <label style="display:flex;align-items:center;gap:5px;font-size:13px;color:var(--text-secondary);cursor:pointer">
          <input type="checkbox" class="node-filter" data-type="sensor"   checked style="accent-color:var(--amber)"> Sensors
        </label>
        <label style="display:flex;align-items:center;gap:5px;font-size:13px;color:var(--text-secondary);cursor:pointer">
          <input type="checkbox" class="node-filter" data-type="domain"   checked style="accent-color:var(--purple)"> Domains
        </label>
        <label style="display:flex;align-items:center;gap:5px;font-size:13px;color:var(--text-secondary);cursor:pointer">
          <input type="checkbox" class="node-filter" data-type="server"   checked style="accent-color:var(--green)"> Servers
        </label>
        <label style="display:flex;align-items:center;gap:5px;font-size:13px;color:var(--text-secondary);cursor:pointer">
          <input type="checkbox" class="node-filter" data-type="internet" checked style="accent-color:var(--text-muted)"> Internet
        </label>

        <div class="map-toolbar-sep"></div>

        <button class="btn btn-ghost btn-sm" id="btn-layout-force">Force layout</button>
        <button class="btn btn-ghost btn-sm" id="btn-layout-hierarchical">Hierarchical</button>
      </div>

      <div class="map-layout">
        <div id="map-canvas-wrap">
          <canvas id="map-canvas"></canvas>

          <!-- Zoom controls -->
          <div class="map-controls">
            <button class="map-control-btn" id="btn-zoom-in"  title="Zoom in">+</button>
            <button class="map-control-btn" id="btn-zoom-out" title="Zoom out">−</button>
            <button class="map-control-btn" id="btn-fit-icon" title="Fit" style="font-size:12px">⊡</button>
          </div>

          <!-- Legend -->
          <div class="map-legend">
            <div class="map-legend-title">Node types</div>
            <div class="map-legend-item"><div class="map-legend-dot" style="background:#3B82F6"></div>Client</div>
            <div class="map-legend-item"><div class="map-legend-dot" style="background:#F59E0B"></div>Sensor</div>
            <div class="map-legend-item"><div class="map-legend-dot" style="background:#A78BFA"></div>Domain</div>
            <div class="map-legend-item"><div class="map-legend-dot" style="background:#22C55E"></div>Server</div>
            <div class="map-legend-item"><div class="map-legend-dot" style="background:#6B7280"></div>Internet</div>
          </div>
        </div>

        <!-- Inspector Panel -->
        <div class="inspector" id="node-inspector">
          <div class="inspector-header">
            <span class="card-title" id="inspector-title">Node details</span>
            <button class="inspector-close" id="inspector-close">×</button>
          </div>
          <div class="inspector-body" id="inspector-body">
            <p class="text-muted t-sm">Select a node to view details.</p>
          </div>
        </div>
      </div>
    </div>
  </main>

  <footer class="statusbar">
    <div class="statusbar-item">
      <div class="statusbar-item-dot green"></div>
      <span id="sb-sensors">4 sensors online</span>
    </div>
    <div class="statusbar-sep">|</div>
    <div class="statusbar-item">
      <span id="map-status">Loading graph…</span>
    </div>
    <div class="statusbar-time" id="statusbar-time"></div>
  </footer>

</div><!-- /app-shell -->

<div class="tooltip-popup" id="map-tooltip" style="display:none"></div>

<script src="/static/js/theme.js"></script>
<script src="/static/js/api.js"></script>
<script src="/static/js/nav.js"></script>
<script src="/static/js/map.js"></script>
</body>
</html>

# Inställningar för DNS-logg-processorn

[neo4j]
uri = neo4j://127.0.0.1:7687
user = neo4j
password =
database = neo4j

[server]
name = dns-primary
role = primary

[log]
file_path = dns.log

[ingest]
batch_size = 2000
worker_count = 4
flush_interval = 5s
max_write_retries = 3
retry_delay = 1s
offset_state_path = state/dnslog.offset.json
dry_run = true

[filter]
ignore_reverse_lookup = true
ignored_domains =
local_domains = lan,local

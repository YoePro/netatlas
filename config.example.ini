# Inställningar för DNS-logg-processorn

[neo4j]
uri = neo4j://127.0.0.1:7687
user = neo4j
password =
database = neo4j

[server]
name = dns-primary
role = primary

[log]
file_path = dns.log

[ingest]
batch_size = 2000
worker_count = 4
flush_interval = 5s
max_write_retries = 3
retry_delay = 1s
offset_state_path = state/dnslog.offset.json
dry_run = false
dry_run_updates_offset = false
runtime_mode = medium
log_mode = normal
genesis = all
genesis_after = 2026-01-01T00:00:00
progress_interval = 10s
parse_failure_samples = 20
parse_failure_path = state/parse-failures.log

[filter]
ignore_reverse_lookup = true
ignored_domains =
local_domains = lan,local

[fingerprints]
rules_path = config/fingerprints.json

[arpscout]
sensor_id =
display_name = primary arpscout
site = homelab
interfaces =

[ui]
listen_address = 0.0.0.0
port = 8080
html_dir = web/html
static_dir = web/static

[retention]
raw_events_days = 14
aggregate_days = 730
single_seen_domain_days = 180
notable_days = 1095
keep_local_domains = true
keep_repeated_min_count = 10
